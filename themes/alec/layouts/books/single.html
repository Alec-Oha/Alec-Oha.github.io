{{ define "main" }}
<nav class="navbar">
    <a href="/">← Back</a>
    <button class="theme-toggle" id="themeToggle" style="width:44px;height:44px;border:2px solid var(--border-mid);border-radius:6px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:background 0.2s;">
        <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;min-width:32px;min-height:32px;display:block;stroke:var(--icon);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;min-width:32px;min-height:32px;display:none;stroke:var(--icon);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>
</nav>

<div class="books-page">
    <div class="books-header">
        <h1 class="page-title">Books</h1>
        <div class="page-sub">Every book read since 2023 — click any entry for details</div>
    </div>
    <div class="books-legend">
        <div class="legend-item"><div class="legend-pip fiction"></div>Fiction</div>
        <div class="legend-item"><div class="legend-pip nonfiction"></div>Non-Fiction</div>
        <div class="legend-item"><div class="legend-pip reviewed"></div>Reviewed</div>
    </div>
    <div class="timeline-outer" id="timelineOuter">
        <div class="timeline-canvas" id="tlCanvas">
            <div class="tl-line" id="tlLine"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-inner" id="modalInner"></div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script src="/js/books.js"></script>
{{ end }}
